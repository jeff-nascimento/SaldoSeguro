<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-straight/css/uicons-solid-straight.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.2.0/uicons-solid-rounded/css/uicons-solid-rounded.css"
    />
    <title>Painel de Finanças</title>
  </head>
  <body>
    <header>
      <div id="combination-mark">
        <img src="./assets/img/logo.png" class="logo" />
        <h1 class="site-name">Saldo <b>Seguro</b></h1>
      </div>
      <div class="theme-toggle" id="theme-toggle">
        <div class="toggle-circle">
          <i class="fi fi-sr-brightness icon-sun"></i>
          <i class="fi fi-ss-moon icon-moon"></i>
        </div>
        <span class="toggle-text">Modo escuro</span>
      </div>
    </header>

    <main>
      <div class="notification" id="notification-area"></div>
      <h2>Resumo da Carteira</h2>
      <section class="financial-summary">
        <div class="total-income">
          <h3>Receita Total</h3>
          <span class="card-revenue">R$ 0.00</span>
        </div>
        <div class="total-expense">
          <h3>Despesa Total</h3>
          <span class="card-expense">R$ 0.00</span>
        </div>
        <div class="balance">
          <h3>Saldo</h3>
          <span class="card-balance">R$ 0.00</span>
        </div>
      </section>

      <section class="transaction-form">
        <form>
          <h2>Nova Movimentação</h2>
          <div class="form-group">
            <label for="description">Descrição</label>
            <input type="text" id="description" />
          </div>

          <div class="form-group">
            <label for="amount">Valor</label>
            <input type="text" id="amount" />
          </div>

          <div class="form-group">
            <label for="type">Tipo</label>
            <select id="type">
              <option value="income">Receitas</option>
              <option value="expense">Despesas</option>
            </select>
          </div>

          <div class="form-group">
            <label for="category">Categoria</label>
            <select id="category">
              <option value="food">Alimentação</option>
              <option value="transportation">Transporte</option>
              <option value="housing">Moradia</option>
              <option value="leisure">Lazer</option>
              <option value="health">Saúde</option>
            </select>
          </div>

          <div class="form-group">
            <label for="date">Data</label>
            <input type="date" id="date" />
          </div>

          <button type="submit" class="form-group">Adicionar Transação</button>
        </form>
      </section>

      <section class="financial-dashboard">
        <div class="filters">
          <h2>filtros</h2>
          <select id="filter-type">
            <option value="all">Todos</option>
            <option value="income">Receitas</option>
            <option value="expense">Despesas</option>
          </select>

          <select id="filter-category">
            <option value="all">Todas categorias</option>
            <option value="food">Alimentação</option>
            <option value="transportation">Transporte</option>
            <option value="housing">Moradia</option>
            <option value="leisure">Lazer</option>
            <option value="health">Saúde</option>
          </select>

          <input type="date" id="start-date" />
          <input type="date" id="end-date" />

          <input
            type="text"
            placeholder="Pesquisar descrição"
            id="filter-description"
          />

          <button type="submit" id="clear-filters">Limpart filtros</button>
        </div>

        <div class="chart-container">
          <h2>Despesas por categoria</h2>
          <div class="chart-wrapper">
            <canvas id="expense-chart"></canvas>
          </div>
        </div>
      </section>

      <section class="transaction-list">
        <h2>Lista de Transações</h2>
        <table id="transactions-table">
          <thead>
            <tr>
              <th class="sortable" data-sort="description">
                Descrição <span class="sort-icon"></span>
              </th>
              <th class="sortable" data-sort="amount">
                Valor <span class="sort-icon"></span>
              </th>
              <th>Tipo</th>
              <th>Categoria</th>
              <th class="sortable" data-sort="date">
                Data <span class="sort-icon"></span>
              </th>
            </tr>
          </thead>
          <tbody id="transaction-body"></tbody>
        </table>

        <div class="modal">
          <span>Tem certeza que deseja excluir esta transação?</span>
          <button type="submit" id="confirm">Confirmar</button>
          <button type="submit" id="cancel">Cancelar</button>
        </div>
      </section>
    </main>
  </body>
</html>
